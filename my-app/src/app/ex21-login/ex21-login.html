<div class="login-container">
  <div class="card" [formGroup]="loginForm">
    <h2>Login</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="text" formControlName="email" placeholder="Enter email" />
      <div class="err" *ngIf="f['email'].touched && f['email'].invalid">
        <span *ngIf="f['email'].errors?.['required']">Email is required</span>
        <span *ngIf="f['email'].errors?.['email']">Email is not valid</span>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="Enter password" />
      <div class="err" *ngIf="f['password'].touched && f['password'].invalid">
        <span *ngIf="f['password'].errors?.['required']">Password is required</span>
        <span *ngIf="f['password'].errors?.['minlength']">Password must be at least 5 characters</span>
      </div>
    </div>

    <label class="remember">
      <input type="checkbox" formControlName="remember" />
      Save login information
    </label>

    <button (click)="onLogin()">Login</button>

    <p class="err" *ngIf="errorMsg">{{ errorMsg }}</p>
    <div class="json" *ngIf="messageJson">{{ messageJson }}</div>

    <div class="footer" style="text-align: center; margin-top: 2rem; font-size: 0.95rem; color: #64748b;">
      <div style="margin-bottom: 12px;">
        Don't have an account? <a routerLink="/register"
          style="color: #4f46e5; text-decoration: none; font-weight: 700;">Register here</a>
      </div>
      <div>
        Are you an administrator? <a routerLink="/admin-login"
          style="color: #1e293b; text-decoration: underline; font-weight: 600;">Admin Login</a>
      </div>
    </div>
  </div>
</div>
