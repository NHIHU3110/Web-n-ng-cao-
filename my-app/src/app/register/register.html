<div class="register-container">
    <div class="card" [formGroup]="registerForm">
        <h2>Create Account</h2>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" formControlName="name" placeholder="Enter your full name" />
            <div class="err" *ngIf="f['name'].touched && f['name'].invalid">
                Full name is required
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="text" formControlName="email" placeholder="Enter your email" />
            <div class="err" *ngIf="f['email'].touched && f['email'].invalid">
                <span *ngIf="f.email.errors?.required">Email is required</span>
                <span *ngIf="f.email.errors?.email">Email is not valid</span>
            </div>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" formControlName="password" placeholder="Min 5 characters" />
            <div class="err" *ngIf="f['password'].touched && f['password'].invalid">
                <span *ngIf="f.password.errors?.required">Password is required</span>
                <span *ngIf="f.password.errors?.minlength">Min 5 characters required</span>
            </div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" formControlName="confirmPassword" placeholder="Confirm your password" />
            <div class="err" *ngIf="f['confirmPassword'].touched && registerForm.errors?.mismatch">
                Passwords do not match
            </div>
        </div>

        <button (click)="onRegister()">Create Account</button>

        <p class="err" *ngIf="errorMsg">{{ errorMsg }}</p>
        <p class="success" *ngIf="successMsg">{{ successMsg }}</p>

        <div class="footer">
            Already have an account? <a routerLink="/ex21-login">Login here</a>
        </div>
    </div>
</div>
